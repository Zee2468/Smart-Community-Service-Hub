{% extends 'base/base.html' %}

{% block content %}

<style>



.login-page{

    min-height:100vh;

    display:flex;

    justify-content:center;

    align-items:center;

    padding:80px 20px;

    background:
    linear-gradient(rgba(35,45,40,.78),
    rgba(35,45,40,.78)),
    url("/media/images/road-with-crack-middle-generative-ai_1036445-6549.avif");

    background-size:cover;

    background-position:center;

}

.login-card{

    width:100%;

    max-width:550px;

    background:rgba(255,255,255,.96);

    backdrop-filter:blur(12px);

    border-radius:30px;

    padding:50px;

    box-shadow:0 25px 60px rgba(0,0,0,.20);

    animation:fadeUp .8s ease;

}

@keyframes fadeUp{

from{

opacity:0;

transform:translateY(40px);

}

to{

opacity:1;

transform:translateY(0);

}

}



.login-logo{

    width:85px;

    height:85px;

    background:#5C7C5C;

    color:white;

    border-radius:50%;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:38px;

    margin:auto;

    margin-bottom:25px;

}

.login-title{

    font-size:40px;

    font-weight:800;

    color:#31473A;

}

.login-text{

    color:#777;

    font-size:17px;

    margin-top:10px;

    margin-bottom:35px;

}



.form-label{

    font-weight:600;

    color:#31473A;

    margin-bottom:8px;

}

.form-control{

    height:58px;

    border-radius:15px;

    border:1px solid #d8d8d8;

    padding:15px 18px;

    transition:.3s;

}

.form-control:focus{

    border-color:#5C7C5C;

    box-shadow:0 0 0 .2rem rgba(92,124,92,.15);

}



.btn-login{

    width:100%;

    height:58px;

    border:none;

    border-radius:15px;

    background:linear-gradient(135deg,#5C7C5C,#31473A);

    color:white;

    font-size:18px;

    font-weight:600;

    transition:.35s;

}

.btn-login:hover{

    transform:translateY(-3px);

    box-shadow:0 15px 30px rgba(0,0,0,.18);

    color:white;

}


.alert{

    border-radius:15px;

}



.register-link{

    color:#5C7C5C;

    text-decoration:none;

    font-weight:700;

}

.register-link:hover{

    color:#31473A;

}

hr{

    margin:30px 0;

}

</style>

<section class="login-page">

    <div class="login-card">

        <div class="text-center">

            <div class="login-logo">

                <i class="bi bi-person-circle"></i>

            </div>

            <h1 class="login-title">

                Welcome Back

            </h1>

            <p class="login-text">

                Login to your Smart Community Hub account
                and continue making your community better.

            </p>

        </div>

        {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <div class="mb-4">

                <label class="form-label">

                    Username

                </label>

                <input

                    type="text"

                    name="username"

                    class="form-control"

                    placeholder="Enter your username"

                    required>

            </div>

            <div class="mb-4">

                <label class="form-label">

                    Password

                </label>

                <input

                    type="password"

                    name="password"

                    class="form-control"

                    placeholder="Enter your password"

                    required>

            </div>

            <button type="submit" class="btn-login">

                <i class="bi bi-box-arrow-in-right me-2"></i>

                Login

            </button>

        </form>

        <hr>

        <div class="text-center">

            <p class="mb-0">

                Don't have an account?

                <a href="{% url 'register' %}" class="register-link">

                    Create One

                </a>

            </p>

        </div>

    </div>

</section>

{% endblock %}
